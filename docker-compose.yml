

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: pm-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: projectdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Monolith Service (Consolidated Backend)
  monolith-service:
    build:
      context: .
      dockerfile: monolith-service/Dockerfile
    container_name: pm-monolith
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/projectdb}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-123456}
      AUTH_SERVICE_URI: https://pm-auth-service.onrender.com
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
