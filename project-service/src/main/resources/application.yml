server:
  port: 8081

spring:
  application:
    name: project-service
  datasource:
    url: jdbc:postgresql://localhost:5432/projectdb
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  public-key-path: classpath:keys/public.pem

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.projectmanager: DEBUG
