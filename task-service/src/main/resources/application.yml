server:
  port: 8082

spring:
  application:
    name: task-service
  datasource:
    url: jdbc:postgresql://localhost:5432/taskdb
    username: postgres
    password: 123456
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  public-key-path: classpath:keys/public.pem

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.projectmanager: DEBUG
